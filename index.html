<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Lam Chun Leung 林俊良醫生 — Name Card</title>
<meta property="og:title" content="Dr. Lam Chun Leung 林俊良醫生" />
<meta property="og:description" content="Specialist in Psychiatry · Shalom Medical Center, Tsim Sha Tsui" />
<meta property="og:image" content="namecard.jpg" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang HK", sans-serif;
    background: #0f3d2e; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; gap: 22px;
  }
  .card-wrap {
    width: 100%; max-width: 560px; background: #fff;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .card-wrap img { width: 100%; height: auto; display: block; }
  .actions { display: flex; gap: 12px; width: 100%; max-width: 560px; flex-wrap: wrap; }
  .actions a {
    flex: 1; min-width: 160px; text-align: center; text-decoration: none;
    padding: 15px 18px; border-radius: 12px; font-size: 1rem; font-weight: 600;
  }
  .save { background: #16a34a; color: #fff; }
  .contact { background: #25D366; color: #fff; }
  .actions a:active { transform: scale(.98); }
  .hint { color: #ffffffcc; font-size: .85rem; text-align: center; max-width: 560px; margin-top: -6px; }
  .hint b { color: #fff; }
  footer { color: #ffffffaa; font-size: .8rem; text-align: center; }
</style>
</head>
<body>
  <div class="card-wrap">
    <img src="namecard.jpg" alt="Dr. Lam Chun Leung 林俊良醫生 — Name Card" />
  </div>

  <div class="actions">
    <a class="save" id="save" href="namecard.jpg">🖼️ Save to Photos</a>
    <a class="contact" href="https://wa.me/85260253303?text=Hi%20Dr.%20Lam%2C%20I%20received%20your%20name%20card." target="_blank" rel="noopener">💬 WhatsApp Me</a>
  </div>

  <p id="hint" class="hint">Tip: tap <b>Save to Photos</b>, then choose <b>“Save Image”</b>.</p>

  <footer>傳仁醫療中心 Shalom Medical Center · Tsim Sha Tsui</footer>

<script>
  // Save straight to the phone's photo album via the native share sheet.
  // iOS requires navigator.share() to fire SYNCHRONOUSLY inside the tap (no await before it),
  // so we preload the image into a File on page load and share that file on click.
  var cardFile = null;
  (async function preload() {
    try {
      var resp = await fetch("namecard.jpg", { cache: "force-cache" });
      var blob = await resp.blob();
      cardFile = new File([blob], "DrLamChunLeung-namecard.jpg", { type: blob.type || "image/jpeg" });
    } catch (e) { /* will fall back below */ }
  })();

  document.getElementById("save").addEventListener("click", function (e) {
    e.preventDefault();
    if (cardFile && navigator.canShare && navigator.canShare({ files: [cardFile] })) {
      // Share sheet → "Save Image" → goes into Photos album.
      navigator.share({ files: [cardFile], title: "Dr. Lam Chun Leung 林俊良醫生" }).catch(function () {});
    } else {
      // Fallback: open the full image so the user can long-press → "Add to Photos".
      window.open("namecard.jpg", "_blank");
    }
  });
</script>
</body>
</html>
